<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SmartConsult Login</title>

  <style>
    html {
      font-size: 100%;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0f1c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      color: white;
      box-sizing: border-box;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: clamp(1.25rem, 4vw, 30px);
      border-radius: 10px;
      width: min(420px, 100%);
      max-width: 100%;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,150,255,0.3);
    }
    .box h2 {
      font-size: clamp(1.75rem, 5vw + 0.5rem, 3rem);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      font-size: larger;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      min-height: 48px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      border: none;
      color: white;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Employee Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
   apiKey: "AIzaSyCRt_nj4Svk4yfZBeQ8jcSr_VQXWrhTqkY",
    authDomain: "smartconsult-employee.firebaseapp.com",
    projectId: "smartconsult-employee",
    storageBucket: "smartconsult-employee.firebasestorage.app",
    messagingSenderId: "595014566518",
    appId: "1:595014566518:web:e3ed37368e5026fd75d557",
    measurementId: "G-B82NX4VPZR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => {
      alert("Login Success 🚀");
      window.location.href = "/dashboard";
    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
