<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SmartConsult Login</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      font-size: 100%;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0a0f1c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      color: white;
      -webkit-overflow-scrolling: touch;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: clamp(1.25rem, 5vw, 2rem);
      border-radius: 12px;
      width: min(420px, 100%);
      max-width: 100%;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,150,255,0.3);
    }
    .box h2 {
      font-size: clamp(1.5rem, 5vw + 0.5rem, 2.25rem);
      margin: 0 0 1rem;
      line-height: 1.2;
    }
    input {
      width: 100%;
      padding: 0.75rem 0.875rem;
      margin: 0.5rem 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      min-height: 48px;
      -webkit-appearance: none;
      appearance: none;
    }

    button {
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.75rem 1rem;
      min-height: 48px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      border: none;
      color: white;
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.98);
    }

    @media (max-width: 360px) {
      .box { padding: 1rem; }
    }

    @media (max-height: 480px) and (orientation: landscape) {
      body { align-items: flex-start; padding-top: max(0.5rem, env(safe-area-inset-top)); }
      .box { margin-block: 0.5rem; }
      input { min-height: 44px; margin: 0.35rem 0; }
    }

    @media (min-width: 600px) {
      .box { padding: 2rem 2.25rem; }
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Employee Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
   apiKey: "AIzaSyCRt_nj4Svk4yfZBeQ8jcSr_VQXWrhTqkY",
    authDomain: "smartconsult-employee.firebaseapp.com",
    projectId: "smartconsult-employee",
    storageBucket: "smartconsult-employee.firebasestorage.app",
    messagingSenderId: "595014566518",
    appId: "1:595014566518:web:e3ed37368e5026fd75d557",
    measurementId: "G-B82NX4VPZR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => {
      alert("Login Success 🚀");
      window.location.href = "/dashboard";
    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
