<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Join the Mission | SmartConsult</title>
  <link rel="stylesheet" href="/career/career.css">
  <link rel="icon" type="image/png" href="../logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body class="single-screen">
  <canvas id="bg-canvas"></canvas>
  
  <nav class="glass-nav">
    <div class="logo">
      <img src="../logo.png" alt="SmartConsult">
      <span>SmartConsult</span>
    </div>
  </nav>

  <main class="viewport">
    <div class="split-layout">
      <!-- Left: Content -->
      <div class="content-side">
        <h1 class="split-text">Transcend <br><span class="gradient-text">Limits</span></h1>
        <p class="tagline">The next evolution of consulting starts with you. Join our neural network of visionaries.</p>
        
        <div class="feature-pills">
          <span class="pill">AI First</span>
          <span class="pill">Remote DNA</span>
          <span class="pill">Equity++</span>
        </div>
      </div>

      <!-- Right: Form -->
      <div class="form-side">
        <div class="glass-box box">
          <h2 class="form-header">Initialize Application</h2>
          
          <div id="errorBox" class="error-box">
            <p id="errorMsg">Already on file ❌</p>
          </div>

          <form id="jobForm">
            <div class="input-row">
              <div class="input-field">
                <input type="text" id="name" placeholder=" " required>
                <label>Full Name</label>
              </div>
            </div>
            <div class="input-row">
              <div class="input-field">
                <input type="email" id="email" placeholder=" " required>
                <label>Email</label>
                
              </div>
            </div>
            <div class="input-row split">
              <div class="input-field">
                <input type="text" id="college" placeholder=" " required>
                <label>Institute</label>
              </div>
              <div class="input-field">
                <input type="number" id="cpi" step="0.01" placeholder=" " required>
                <label>CPI</label>
              </div>
            </div>
            <div class="input-row">
              <div class="input-field">
                <input type="tel" id="phone" placeholder=" " required>
                <label>Phone</label>
              </div>
            </div>
            
            <button type="submit" class="cyber-btn">
              <span>Submit</span>
              <div class="btn-glitch"></div>
            </button>
          </form>

          <div id="loader" class="loader">
            <div class="scanner-wrap">
              <div class="scanner"></div>
            </div>
            <p>Processing...</p>
          </div>

          <button class="minimal-btn" onclick="goToLogin()">
            Already Working with Us? <span class="arrow">→</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer class="minimal-footer">
    <div class="status-indicator">
      <span class="dot"></span>
      <span>System: All Systems Nominal</span>
    </div>
  </footer>

  <script src="career/career.js"></script>
</body>
</html>
