<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/png" href="../logo.png">
  <title>SmartConsult Dashboard</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      font-size: 100%;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      background: #0a0f1c;
      color: white;
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      row-gap: 10px;
      padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 12px max(16px, env(safe-area-inset-left));
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 10px rgba(0,150,255,0.2);
    }

    .navbar h2 {
      font-size: clamp(1rem, 2.8vw + 0.5rem, 1.5rem);
      margin: 0;
      flex: 1 1 auto;
      min-width: 0;
      line-height: 1.25;
    }

    .navbar button {
      flex-shrink: 0;
      padding: 0.625rem 1.125rem;
      min-height: 44px;
      min-width: 88px;
      border: none;
      background: #0072ff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: clamp(0.875rem, 2vw, 1rem);
      transition: opacity 0.2s, transform 0.15s;
    }

    @media (hover: hover) {
      .navbar button:hover { opacity: 0.92; }
    }

    .dashboard {
      padding: clamp(1rem, 4vw, 2rem);
      padding-left: max(clamp(1rem, 4vw, 2rem), env(safe-area-inset-left));
      padding-right: max(clamp(1rem, 4vw, 2rem), env(safe-area-inset-right));
      max-width: 1200px;
      margin: 0 auto;
    }

    .dashboard h1 {
      font-size: clamp(1.35rem, 3vw + 0.5rem, 2rem);
      margin: 0 0 0.5rem;
      line-height: 1.25;
      word-break: break-word;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr));
      gap: clamp(12px, 3vw, 20px);
      margin-top: clamp(16px, 3vw, 24px);
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: clamp(16px, 3vw, 22px);
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,150,255,0.2);
      transition: transform 0.3s;
      min-height: 120px;
    }

    .card h3 {
      font-size: clamp(1.05rem, 2.2vw, 1.2rem);
      margin: 0 0 0.5rem;
    }

    .card p {
      font-size: clamp(0.875rem, 2vw, 1rem);
      margin: 0;
      line-height: 1.45;
      color: rgba(255,255,255,0.85);
    }

    @media (hover: hover) and (pointer: fine) {
      .card:hover { transform: translateY(-4px); }
    }

    @media (max-width: 400px) {
      .navbar { flex-direction: column; align-items: stretch; text-align: center; }
      .navbar button { width: 100%; }
    }

    @media (min-width: 900px) {
      .cards { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>

<body>

<div class="navbar">
  <h2>SmartConsult Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="dashboard">
  <h1>Welcome Employee 🚀</h1>

  <div class="cards">
    <div class="card">
      <h3>Tasks</h3>
      <p>View your assigned work</p>
    </div>

    <div class="card">
      <h3>Leads</h3>
      <p>Check new client leads</p>
    </div>

    <div class="card">
      <h3>Messages</h3>
      <p>Team communication</p>
    </div>
  </div>
</div>

<!-- Firebase Auth Protection -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
   apiKey: "AIzaSyCRt_nj4Svk4yfZBeQ8jcSr_VQXWrhTqkY",
    authDomain: "smartconsult-employee.firebaseapp.com",
    projectId: "smartconsult-employee",
    storageBucket: "smartconsult-employee.firebasestorage.app",
    messagingSenderId: "595014566518",
    appId: "1:595014566518:web:e3ed37368e5026fd75d557",
    measurementId: "G-B82NX4VPZR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Protect dashboard
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "/login";
  }
});

// Logout
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "/login";
  });
};
</script>

</body>
</html>
