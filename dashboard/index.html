<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/png" href="../logo.png">
  <title>SmartConsult Dashboard</title>

  <style>
    html {
      font-size: 100%;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0f1c;
      color: white;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: max(15px, env(safe-area-inset-top)) max(30px, env(safe-area-inset-right)) 15px max(30px, env(safe-area-inset-left));
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 10px rgba(0,150,255,0.2);
    }

    .navbar h2 { font-size: clamp(1.1rem, 3vw, 1.5rem); margin: 0; }

    .dashboard {
      padding: clamp(1rem, 4vw, 30px);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,150,255,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #0072ff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="navbar">
  <h2>SmartConsult Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="dashboard">
  <h1>Welcome Employee 🚀</h1>

  <div class="cards">
    <div class="card">
      <h3>Tasks</h3>
      <p>View your assigned work</p>
    </div>

    <div class="card">
      <h3>Leads</h3>
      <p>Check new client leads</p>
    </div>

    <div class="card">
      <h3>Messages</h3>
      <p>Team communication</p>
    </div>
  </div>
</div>

<!-- Firebase Auth Protection -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
   apiKey: "AIzaSyCRt_nj4Svk4yfZBeQ8jcSr_VQXWrhTqkY",
    authDomain: "smartconsult-employee.firebaseapp.com",
    projectId: "smartconsult-employee",
    storageBucket: "smartconsult-employee.firebasestorage.app",
    messagingSenderId: "595014566518",
    appId: "1:595014566518:web:e3ed37368e5026fd75d557",
    measurementId: "G-B82NX4VPZR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Protect dashboard
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// Logout
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
