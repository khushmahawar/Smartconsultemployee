<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartConsult Careers</title>
<link rel="icon" type="image/png" href="../logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-glow"></div>
    
    <div class="container fade">
        <h1>We Are Hiring</h1>
        <p>Join SmartConsult and build the future with us</p>
        <div id="timer">
  <div class="time-box">
    <span id="days">00</span>
    <p>Days</p>
  </div>
  <div class="time-box">
    <span id="hours">00</span>
    <p>Hours</p>
  </div>
  <div class="time-box">
    <span id="minutes">00</span>
    <p>Minutes</p>
  </div>
  <div class="time-box">
    <span id="seconds">00</span>
    <p>Seconds</p>
  </div>
</div>

  <div class="buttons">
    <button class="apply-btn" onclick="goToApply()">Apply Now</button>
    <button class="login-btn" onclick="goToLogin()">Already with us? Login</button>
  </div>
  <div class="mainwebsite">
    <p>To know more about <a href="https://smartconsult.vercel.app" target="_blank">SmartConsult</a>? Visit our website</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
